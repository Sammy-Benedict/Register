<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Admin Login - Department Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const department = sessionStorage.getItem('selectedDepartment') || 'Department';
            document.getElementById('pageTitle').textContent = `Admin Login - ${department} Portal`;
            const logoSpan = document.querySelector('.logo span');
            if (logoSpan) logoSpan.textContent = `${department} Portal`;
        });
    </script>
    <style>
        /* Extra styles for login page */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1f5bb5 0%, #0f2f5a 100%);
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 450px;
            padding: 2.5rem;
            animation: slideDown 0.4s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            color: #0c1b2a;
            margin: 0 0 0.5rem 0;
        }

        .login-header p {
            color: #5a6b7a;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #0c1b2a;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #e1e5ea;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1f5bb5;
            box-shadow: 0 0 0 3px rgba(31, 91, 181, 0.1);
        }

        .form-group select {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #e1e5ea;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
            background-color: white;
            cursor: pointer;
        }

        .form-group select:focus {
            outline: none;
            border-color: #1f5bb5;
            box-shadow: 0 0 0 3px rgba(31, 91, 181, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #1f5bb5, #0f2f5a);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 20px rgba(31, 91, 181, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(31, 91, 181, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .toggle-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #5a6b7a;
        }

        .toggle-link a {
            color: #1f5bb5;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .auth-message {
            margin-bottom: 1rem;
        }

        .hidden-form {
            display: none;
        }

        .admin-badge {
            display: inline-block;
            background: #fff0ed;
            color: #b13a25;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 0.5rem;
        }

        @media (max-width: 600px) {
            .login-card {
                padding: 2rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Department Registration Portal <span class="admin-badge">ADMIN</span></h1>
                <p id="formTitle">Administrator Login</p>
            </div>

            <div id="authMessage" class="auth-message"></div>

            <!-- Admin Login Form -->
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn" id="adminLoginBtn">Login to Dashboard</button>

                <div class="toggle-link">
                    Don't have an account? <a onclick="toggleAdminForms()">Register here</a>
                </div>
            </form>

            <!-- Admin Registration Form -->
            <form id="adminRegisterForm" class="hidden-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="registerAdminName" placeholder="Your full name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="registerAdminEmail" placeholder="admin@example.com" required>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <select id="registerAdminDepartment" class="styled-select" required>
                        <option value="">Select Your Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Hospitality Management">Hospitality Management</option>
                        <option value="Food Science">Food Science</option>
                        <option value="Fashion Design">Fashion Design</option>
                        <option value="Business Administration">Business Administration</option>
                        <option value="Accountancy">Accountancy</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Renewable Energy">Renewable Energy</option>
                        <option value="Building and Construction">Building and Construction</option>
                        <option value="Civil Engineering">Civil Engineering</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                        <option value="Tourism Management">Tourism Management</option>
                        <option value="Graphic Design">Graphic Design</option>
                        <option value="Statistics and Mathematics">Statistics and Mathematics</option>
                        <option value="Liberal Studies">Liberal Studies</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerAdminPassword" placeholder="Create a password" required>
                </div>

                <button type="submit" class="login-btn" id="adminRegisterBtn">Create Admin Account</button>

                <div class="toggle-link">
                    Already have an account? <a onclick="toggleAdminForms()">Login here</a>
                </div>
            </form>

            <div class="toggle-link" style="margin-top: 2rem; border-top: 1px solid #e1e5ea; padding-top: 1rem;">
                <a href="student-login.html">Login as Student</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // ====================================================================
        // ADMIN LOGIN/REGISTRATION SCRIPT
        // ====================================================================

        const API_BASE = window.location.origin|| "http://localhost:5000";

        // DOM Elements
        const authMessage = document.getElementById("authMessage");
        const adminLoginForm = document.getElementById("adminLoginForm");
        const adminRegisterForm = document.getElementById("adminRegisterForm");
        const formTitle = document.getElementById("formTitle");

        /**
         * Display authentication message to user
         * @param {string} message - The message to display
         * @param {string} type - Type: 'success', 'error', or 'info'
         */
        const showMessage = (message, type = "info") => {
            authMessage.textContent = message;
            authMessage.className = `info-banner ${type}`;
        };

        /**
         * Toggle between admin login and registration forms
         */
        function toggleAdminForms() {
            adminLoginForm.classList.toggle("hidden-form");
            adminRegisterForm.classList.toggle("hidden-form");
            formTitle.textContent = adminLoginForm.classList.contains("hidden-form") 
                ? "Administrator Registration" 
                : "Administrator Login";
            showMessage("", "info");
        }

        /**
         * Handle admin login
         */
        adminLoginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("adminEmail").value;
            const password = document.getElementById("adminPassword").value;

            if (!email || !password) {
                showMessage("Please fill in all fields", "error");
                return;
            }

            try {
                showMessage("Logging in...", "info");
                const response = await fetch(`${API_BASE}/api/auth/admin`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (!response.ok || result.status !== "success") {
                    showMessage(result.message || "Login failed", "error");
                    return;
                }

                // Store admin token and data in localStorage
                localStorage.setItem("authToken", result.token);
                localStorage.setItem("adminData", JSON.stringify(result.admin));
                localStorage.setItem("userRole", "admin");

                showMessage("Login successful! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 1500);
            } catch (error) {
                console.error("Login error:", error);
                showMessage("Login failed. Check server connection.", "error");
            }
        });

        /**
         * Handle admin registration
         */
        adminRegisterForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("registerAdminName").value;
            const email = document.getElementById("registerAdminEmail").value;
            const department = document.getElementById("registerAdminDepartment").value;
            const password = document.getElementById("registerAdminPassword").value;

            if (!name || !email || !department || !password) {
                showMessage("Please fill in all fields", "error");
                return;
            }

            try {
                showMessage("Creating admin account...", "info");
                const response = await fetch(`${API_BASE}/api/auth/admin/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, department, password })
                });

                const result = await response.json();

                if (!response.ok || result.status !== "success") {
                    showMessage(result.message || "Registration failed", "error");
                    return;
                }

                // Store admin token and data in localStorage
                localStorage.setItem("authToken", result.token);
                localStorage.setItem("adminData", JSON.stringify(result.admin));
                localStorage.setItem("userRole", "admin");

                showMessage("Admin account created successfully! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 1500);
            } catch (error) {
                console.error("Registration error:", error);
                showMessage("Registration failed. Check server connection.", "error");
            }
        });
    </script>
</body>
</html>
